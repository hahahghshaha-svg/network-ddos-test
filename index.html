<!DOCTYPE html>
<html>
<head>
    <title>🔥 FIRE PANEL</title>
    <style>
        body { background: black; color: #0f0; font-family: monospace; padding: 20px; }
        input, button { background: #111; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 5px; }
        button { cursor: pointer; }
        #log { background: #000; border: 1px solid #0f0; height: 300px; overflow-y: auto; padding: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>💀 VERCEL FIRE PANEL v1.0</h1>
    <input type="text" id="target" placeholder="http://target:port" size="50">
    <input type="number" id="count" placeholder="요청 수" value="1000">
    <button onclick="attack()">💣 FIRE</button>
    <div id="log">>> Ready</div>

    <script>
        async function attack() {
            const target = document.getElementById('target').value;
            const count = document.getElementById('count').value;
            const logDiv = document.getElementById('log');
            
            logDiv.innerText = `>> Firing ${count} requests to ${target}...\n`;
            
            try {
                const res = await fetch(`/api/attack?target=${target}&count=${count}`);
                const text = await res.text();
                logDiv.innerText += text;
            } catch(e) {
                logDiv.innerText += `ERROR: ${e.message}`;
            }
        }
    </script>
</body>
</html>
