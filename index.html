<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>💀 FIRE PANEL</title>
    <style>
        body { background: black; color: #0f0; font-family: monospace; padding: 20px; }
        input, button { background: #111; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 5px; }
        button { cursor: pointer; }
        #log { background: #000; border: 1px solid #0f0; height: 400px; overflow-y: auto; padding: 10px; margin-top: 20px; }
        .error { color: #f44; }
    </style>
</head>
<body>
    <h1>💀 VERCEL FIRE PANEL</h1>
    <input type="text" id="target" placeholder="http://목표IP:포트" size="50">
    <input type="number" id="count" placeholder="요청수" value="1000">
    <button onclick="start()">🔥 FIRE</button>
    <div id="log">>> READY</div>

    <script>
        async function start() {
            const target = document.getElementById('target').value;
            const count = document.getElementById('count').value;
            const logDiv = document.getElementById('log');
            
            if (!target) {
                logDiv.innerHTML = '<div class="error">❌ TARGET 없음</div>' + logDiv.innerHTML;
                return;
            }
            
            logDiv.innerHTML = `<div>> 🚀 ${count}발 발사 → ${target}</div>` + logDiv.innerHTML;
            
            try {
                const res = await fetch('/api/attack?target=' + encodeURIComponent(target) + '&count=' + count);
                const txt = await res.text();
                logDiv.innerHTML = `<div>✅ ${txt}</div>` + logDiv.innerHTML;
            } catch(e) {
                logDiv.innerHTML = `<div class="error">❌ 에러: ${e.message}</div>` + logDiv.innerHTML;
            }
        }
    </script>
</body>
</html>
