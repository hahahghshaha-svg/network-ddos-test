<!DOCTYPE html>
<html>
<head>
    <title>🔥 VERCEL FIRE PANEL</title>
    <style>
        body { background: black; color: #0f0; font-family: monospace; padding: 20px; }
        input, button { background: #111; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 5px; }
        button { cursor: pointer; }
        #log { background: #000; border: 1px solid #0f0; height: 400px; overflow-y: auto; padding: 10px; margin-top: 20px; white-space: pre-wrap; }
        .error { color: #f44; }
        .success { color: #0f0; }
    </style>
</head>
<body>
    <h1>💀 VERCEL FIRE PANEL v2.0</h1>
    <div>
        <input type="text" id="target" placeholder="http://target:port" size="50">
        <input type="number" id="count" placeholder="요청 수" value="1000">
        <button onclick="startAttack()">🔥 FIRE</button>
    </div>
    <div id="log">>> Ready. Enter target and click FIRE.\n</div>

    <script>
        function log(msg, isError = false) {
            const logDiv = document.getElementById('log');
            const div = document.createElement('div');
            div.className = isError ? 'error' : 'success';
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function startAttack() {
            const target = document.getElementById('target').value;
            const count = document.getElementById('count').value;

            if (!target || target === 'http://') {
                log('❌ TARGET REQUIRED', true);
                return;
            }

            log(`🚀 FIRING ${count} requests to ${target}`);

            try {
                const response = await fetch(`/api/attack?target=${encodeURIComponent(target)}&count=${count}`);
                const text = await response.text();
                
                if (response.ok) {
                    log(text);
                } else {
                    log(`❌ ERROR: ${text}`, true);
                }
            } catch (err) {
                log(`❌ NETWORK ERROR: ${err.message}`, true);
            }
        }
    </script>
</body>
</html>
